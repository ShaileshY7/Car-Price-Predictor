<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Price Predictor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.11.2/css/all.css">
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@2.0.0/dist/tf.min.js"></script>
</head>
<body>

<div class="page-wrapper">

    <header class="header">
        <div class="header-badge">
            <i class="fas fa-car"></i>
            AI-Powered Valuation
        </div>
        <h1>Car Price <span>Predictor</span></h1>
        <p>Get an instant resale estimate for your vehicle.<br>Fill in the details below to get started.</p>
    </header>

    <div class="card">
        <form method="post" accept-charset="utf-8" name="Modelform" onsubmit="return false;">

            <div class="form-grid">
                <div class="form-group">
                    <label><i class="fas fa-industry"></i> Company</label>
                    <select class="form-control" id="company" name="company" required
                            onchange="load_car_models(this.id,'car_models')">
                        {% for company in companies %}
                        <option value="{{ company }}">{{ company }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-car-side"></i> Model</label>
                    <select class="form-control" id="car_models" name="car_models" required>
                    </select>
                </div>
            </div>

            <div class="form-grid">
                <div class="form-group">
                    <label><i class="fas fa-calendar-alt"></i> Year of Purchase</label>
                    <select class="form-control" id="year" name="year" required>
                        {% for year in years %}
                        <option value="{{ year }}">{{ year }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-gas-pump"></i> Fuel Type</label>
                    <select class="form-control" id="fuel_type" name="fuel_type" required>
                        {% for fuel in fuel_types %}
                        <option value="{{ fuel }}">{{ fuel }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <hr class="divider">

            <div class="form-group">
                <label><i class="fas fa-road"></i> Kilometres Driven</label>
                <div class="input-wrapper">
                    <input type="number" class="form-control" id="kilo_driven" name="kilo_driven"
                           placeholder="e.g. 45000" min="0">
                    <span class="unit">KM</span>
                </div>
            </div>

            <button class="btn-predict" onclick="send_data()">
                <i class="fas fa-bolt"></i>
                Predict Resale Price
            </button>

        </form>

        <div class="result-box hidden" id="result-box">
            <div class="result-inner">
                <div class="result-icon">
                    <i class="fas fa-tag" id="result-icon-i"></i>
                </div>
                <div>
                    <div class="result-label">Estimated Resale Value</div>
                    <div class="result-price" id="prediction">—</div>
                </div>
            </div>
        </div>

    </div>

    <div class="footer">
        Predictions are estimates based on market data. Actual prices may vary.
    </div>

</div>

<script>
    function load_car_models(company_id, car_model_id) {
        var company = document.getElementById(company_id);
        var car_model = document.getElementById(car_model_id);
        car_model.value = "";
        car_model.innerHTML = "";
        {% for company in companies %}
            if (company.value == "{{ company }}") {
                {% for model in car_models %}
                    {% if company in model %}
                        var newOption = document.createElement("option");
                        newOption.value = "{{ model }}";
                        newOption.innerHTML = "{{ model }}";
                        car_model.options.add(newOption);
                    {% endif %}
                {% endfor %}
            }
        {% endfor %}
    }

    function send_data() {
        var resultBox = document.getElementById('result-box');
        var prediction = document.getElementById('prediction');
        var resultIconI = document.getElementById('result-icon-i');

        resultBox.className = 'result-box loading visible';
        resultIconI.className = 'fas fa-circle-notch fa-spin-custom';
        prediction.textContent = 'Calculating price…';

        var fd = new FormData(document.querySelector('form'));
        var xhr = new XMLHttpRequest({ mozSystem: true });
        xhr.open('POST', '/predict', true);

        xhr.onreadystatechange = function () {
            if (xhr.readyState == XMLHttpRequest.DONE) {
                resultBox.className = 'result-box visible';
                resultIconI.className = 'fas fa-tag';
                var raw = Math.round(Number(xhr.responseText));
                var formatted = '₹' + raw.toLocaleString('en-IN');
                var subLabel = '';
                if (raw >= 10000000) {
                    // Crores: 1,00,00,000+
                    subLabel = '≈ ' + (raw / 10000000).toFixed(2) + ' Crore';
                } else if (raw >= 100000) {
                    // Lakhs: 1,00,000 to 99,99,999
                    subLabel = '≈ ' + (raw / 100000).toFixed(2) + ' Lakh';
                } else if (raw >= 1000) {
                    // Thousands: 1,000 to 99,999
                    subLabel = '≈ ' + (raw / 1000).toFixed(1) + ' Thousand';
                } else {
                    subLabel = 'Estimated value';
                }
                prediction.innerHTML = formatted + '<span class="result-lakhs">' + subLabel + '</span>';
            }
        };

        xhr.send(fd);
    }
</script>

</body>
</html>
